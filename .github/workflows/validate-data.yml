name: V6 Validate Data

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JSON and foundation
        run: node scripts/validation/validate-build.js
